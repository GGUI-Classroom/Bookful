services:
  - type: web
    name: bookful-web
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: FLASK_ENV
        value: production
      - key: PUBLIC_BASE_URL
        sync: false
      - key: GMAIL_CLIENT_ID
        sync: false
      - key: GMAIL_CLIENT_SECRET
        sync: false
      - key: GMAIL_REFRESH_TOKEN
        sync: false
      - key: GMAIL_SENDER_EMAIL
        sync: false
      - key: GMAIL_SENDER_NAME
        value: Bookful Reports
      - key: REPORT_JOB_SECRET
        generateValue: true
