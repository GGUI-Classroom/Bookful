databases:
  - name: bookful-db
    plan: free
    databaseName: bookful
    user: bookful_user

services:
  - type: web
    name: bookful-web
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bookful-db
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: FLASK_ENV
        value: production
